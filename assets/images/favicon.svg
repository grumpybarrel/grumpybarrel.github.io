<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Barrel body -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="#c8a96e"/>
  <!-- Top hoop -->
  <rect x="15" y="22" width="70" height="8" rx="4" fill="#9a7a45"/>
  <!-- Middle hoop -->
  <rect x="12" y="46" width="76" height="8" rx="4" fill="#9a7a45"/>
  <!-- Bottom hoop -->
  <rect x="15" y="70" width="70" height="8" rx="4" fill="#9a7a45"/>
  <!-- Stave lines -->
  <line x1="36" y1="20" x2="36" y2="80" stroke="#b8954f" stroke-width="2"/>
  <line x1="50" y1="20" x2="50" y2="80" stroke="#b8954f" stroke-width="2"/>
  <line x1="64" y1="20" x2="64" y2="80" stroke="#b8954f" stroke-width="2"/>
</svg>
